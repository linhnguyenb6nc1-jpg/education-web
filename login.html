<!DOCTYPE html>
<html>
<body>

<h2>Login</h2>

<input id="email" placeholder="email"><br><br>
<input id="pass" type="password" placeholder="password"><br><br>

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyCTyfD9rGmIEn6dr12KpwRqsg7ebzTBfdA",
  authDomain: "education-web-31bec.firebaseapp.com",
  projectId: "education-web-31bec"
});

const auth = getAuth(app);

window.login = function() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => {
      alert("OK");
      window.location.href = "home.html";
    })
    .catch(e => alert(e.message));
}

window.register = function() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  createUserWithEmailAndPassword(auth, email, pass)
    .then(() => alert("Created"))
    .catch(e => alert(e.message));
}
</script>

</body>
</html>
