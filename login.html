<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<script>
function login() {
  let role = prompt("Nhập role: student / teacher / parent / admin");

  if(role === "student") location.href="dashboard.html";
  else if(role === "teacher") location.href="teacher.html";
  else if(role === "parent") location.href="parent.html";
  else if(role === "admin") location.href="admin.html";
  else alert("Sai role");
}
</script>

</body>
</html>
