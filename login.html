<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCTyfD9rGmIEn6dr12KpwRqsg7ebzTBfdA",
  authDomain: "education-web-31bec.firebaseapp.com",
  projectId: "education-web-31bec",
  appId: "1:595887483632:web:2b62f1fd3dc5d2d5043035"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function validate(email, pass) {
  if(!email.includes("@")) { alert("Email không hợp lệ"); return false; }
  if(pass.length < 6) { alert("Mật khẩu phải ≥ 6 ký tự"); return false; }
  return true;
}

window.handleRegister = function() {
  const email = document.getElementById("txtEmail").value.trim();
  const pass = document.getElementById("txtPass").value.trim();
  if(!validate(email, pass)) return;

  createUserWithEmailAndPassword(auth, email, pass)
    .then(() => alert("🎉 Đăng ký thành công!"))
    .catch(err => alert("Lỗi: " + err.message));
}

window.handleLogin = function() {
  const email = document.getElementById("txtEmail").value.trim();
  const pass = document.getElementById("txtPass").value.trim();
  if(!validate(email, pass)) return;

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => {
      alert("✅ Đăng nhập thành công!");
      window.location.href = "home.html";
    })
    .catch(err => alert("Sai thông tin: " + err.message));
}
</script>
