<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>

<body>

<h2>Đăng nhập</h2>

<input id="txtEmail" type="email" placeholder="Email"><br><br>
<input id="txtPass" type="password" placeholder="Password"><br><br>

<button onclick="handleLogin()">Đăng nhập</button>
<button onclick="handleRegister()">Đăng ký</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCTyfD9rGmIEn6dr12KpwRqsg7ebzTBfdA",
  authDomain: "education-web-31bec.firebaseapp.com",
  projectId: "education-web-31bec",
  appId: "1:595887483632:web:2b62f1fd3dc5d2d5043035"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.handleLogin = function() {
  const email = document.getElementById("txtEmail").value;
  const pass = document.getElementById("txtPass").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => {
      alert("✅ Thành công");
      window.location.href = "home.html";
    })
    .catch(err => alert(err.message));
}

window.handleRegister = function() {
  const email = document.getElementById("txtEmail").value;
  const pass = document.getElementById("txtPass").value;

  createUserWithEmailAndPassword(auth, email, pass)
    .then(() => alert("🎉 Đăng ký OK"))
    .catch(err => alert(err.message));
}
</script>

</body>
</html>
