<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng Nhập EdTech</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Arial, sans-serif; }
    body { background: linear-gradient(135deg,#1e90ff,#87cefa); display:flex; justify-content:center; align-items:center; height:100vh; }
    .login-box { width: 360px; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 15px 30px rgba(0,0,0,0.2); text-align: center; }
    .login-box h2 { color:#1a73e8; margin-bottom: 25px; }
    input { width: 100%; margin:10px 0; padding:12px; border:1px solid #ddd; border-radius:8px; }
    button { width:100%; padding:12px; margin-top:12px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; transition:0.3s; }
    .btn-login { background:#1a73e8; color:white; }
    .btn-reg { background:#f1f3f4; color:#3c4043; border:1px solid #dadce0; }
    button:hover { opacity:0.85; }
    @media(max-width:400px) { .login-box { width:90%; padding:30px; } }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Đăng Nhập EdTech</h2>
  <input id="txtEmail" type="email" placeholder="Email của bạn">
  <input id="txtPass" type="password" placeholder="Mật khẩu (≥6 ký tự)">
  <button class="btn-login" onclick="handleLogin()">Đăng nhập</button>
  <button class="btn-reg" onclick="handleRegister()">Tạo tài khoản mới</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCTyfD9rGmIEn6dr12KpwRqsg7ebzTBfdA",
  authDomain: "education-web-31bec.firebaseapp.com",
  projectId: "education-web-31bec",
  appId: "1:595887483632:web:2b62f1fd3dc5d2d5043035"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Validate cơ bản
function validate(email, pass) {
  if(!email.includes("@")) { alert("Email không hợp lệ"); return false; }
  if(pass.length < 6) { alert("Mật khẩu phải ≥ 6 ký tự"); return false; }
  return true;
}

// Đăng ký
window.handleRegister = function() {
  const email = document.getElementById("txtEmail").value.trim();
  const pass = document.getElementById("txtPass").value.trim();
  if(!validate(email, pass)) return;

  createUserWithEmailAndPassword(auth, email, pass)
    .then(() => { 
      alert("🎉 Chúc mừng! Đăng ký thành công!"); 
      document.getElementById("txtEmail").value = "";
      document.getElementById("txtPass").value = "";
    })
    .catch(err => alert("Lỗi: " + err.message));
}

// Đăng nhập
window.handleLogin = function() {
  const email = document.getElementById("txtEmail").value.trim();
  const pass = document.getElementById("txtPass").value.trim();
  if(!validate(email, pass)) return;

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => { 
      alert("✅ Đăng nhập thành công!");
      window.location.href = "index.html"; // Chuyển về trang chủ
    })
    .catch(err => alert("Sai thông tin: " + err.message));
}
</script>

</body>
</html>
