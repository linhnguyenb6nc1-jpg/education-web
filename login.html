<h2>Login</h2>

<button onclick="login()">Đăng nhập</button>

<script>
function login() {
  let role = prompt("student / teacher / parent / admin");

  if(role=="student") location.href="dashboard.html";
  if(role=="teacher") location.href="teacher.html";
  if(role=="parent") location.href="parent.html";
  if(role=="admin") location.href="admin.html";
}
</script>
