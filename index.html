<!DOCTYPE html>
<html>
<head>
  <title>Hệ Thống Quản Lý Giáo Dục</title>
  <meta charset="UTF-8">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .login-box { width: 320px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
    h2 { color: #1a73e8; margin-bottom: 20px; }
    input { width: 100%; margin: 10px 0; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .btn-login { background: #1a73e8; color: white; }
    .btn-reg { background: #f1f3f4; color: #3c4043; border: 1px solid #dadce0; }
    button:hover { opacity: 0.8; }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Đăng Nhập EdTech</h2>
  <input type="text" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
  <button class="btn-login" onclick="handleLogin()">Đăng nhập</button>
  <button class="btn-reg" onclick="handleRegister()">Tạo tài khoản mới</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

  // Đây là chìa khóa chính chủ từ hình bạn gửi
  const firebaseConfig = {
    apiKey: "AIzaSyCTyfD9rGmIEn6dr12KpwRqsg7ebzTBfdA",
    authDomain: "education-web-31bec.firebaseapp.com",
    projectId: "education-web-31bec",
    appId: "1:595887483632:web:2b62f1fd3dc5d2d5043035"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Hàm Đăng ký
  window.handleRegister = function() {
    const email = document.getElementById("txtEmail").value;
    const pass = document.getElementById("txtPass").value;
    
    createUserWithEmailAndPassword(auth, email, pass)
      .then(() => alert("🎉 Chúc mừng Linh! Đăng ký thành công rồi nè!"))
      .catch(err => alert("Lỗi rồi: " + err.message));
  }

  // Hàm Đăng nhập
  window.handleLogin = function() {
    const email = document.getElementById("txtEmail").value;
    const pass = document.getElementById("txtPass").value;
    
    signInWithEmailAndPassword(auth, email, pass)
      .then(() => alert("✅ Đã vào hệ thống thành công!"))
      .catch(err => alert("Sai thông tin rồi Linh ơi: " + err.message));
  }
<script>
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (email === "admin@gmail.com" && password === "123456") {
    // đăng nhập đúng → chuyển trang
    window.location.href = "home.html";
  } else {
    alert("Sai tài khoản hoặc mật khẩu!");
  }
}
</script>

</body>
</html>
