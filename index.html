<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<div class="login-box">
  <h2>Login</h2>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Đăng nhập</button>
  <button onclick="register()">Đăng ký</button>
</div>

<style>
body{
  font-family: Arial;
}
.login-box{
  width:300px;
  margin:100px auto;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px #ccc;
  text-align:center;
}
input{
  width:100%;
  margin:10px 0;
  padding:10px;
}
button{
  margin:5px;
  padding:10px;
}
</style>

<!-- DÁN SCRIPT FIREBASE Ở ĐÂY -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

// COPY LẠI CONFIG CỦA BẠN VÀO ĐÂY (Cái có apiKey, projectId ấy)
const firebaseConfig = {
  apiKey: "AIzaSyCTyfD9rGmIEn6dr12KpwRqsg7ebzTBfdA",
  authDomain: "education-web-31bec.firebaseapp.com",
  projectId: "education-web-31bec",
  appId: "1:595887483632:web:2b62f1fd3dc5d2d5043035"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = function() {
  const e = document.getElementById("email").value;
  const p = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, e, p)
    .then(() => alert("Đăng ký thành công!"))
    .catch(err => alert("Lỗi: " + err.message));
}

window.login = function() {
  const e = document.getElementById("email").value;
  const p = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, e, p)
    .then(() => alert("Đăng nhập thành công!"))
    .catch(err => alert("Lỗi: " + err.message));
}
</script>
