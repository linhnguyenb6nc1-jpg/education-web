<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<h2>Thống kê</h2>
<canvas id="chart"></canvas>

<script>
let score = localStorage.getItem("score") || 0;

new Chart(document.getElementById("chart"), {
  type: "bar",
  data: {
    labels: ["Điểm"],
    datasets: [{
      label: "Kết quả",
      data: [score]
    }]
  }
});
</script>
